services:
  db:
    image: postgres:16.2
    container_name: pettech_db
    environment:
      POSTGRES_DB: pettech
      POSTGRES_USER: pettech_user
      POSTGRES_PASSWORD: pettech_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - pettech_network
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: pettech_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - pettech_network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: pettech_backend
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: django-insecure-dev-key-change-in-prod
      DJANGO_DEBUG: "True"
      DB_NAME: pettech
      DB_USER: pettech_user
      DB_PASSWORD: pettech_password
      DB_HOST: db
      DB_PORT: "5432"
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
      MINIO_BUCKET: pettech-fotos
      MINIO_ENDPOINT: http://minio:9000
      DEFAULT_ADMIN_EMAIL: admin@pettech.com
      DEFAULT_ADMIN_PASSWORD: Admin1234!
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - pettech_network
    restart: always
    command:
      - sh
      - -c
      - "python manage.py wait_for_db && python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"

networks:
  pettech_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
