name: CI/CD Backend

on:
  push:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ────────────────────────────────────────────────
  # JOB 1 — Install + Lint
  # ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/development.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/development.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 apps/ core/ config/ \
            --max-line-length=120 \
            --exclude=migrations,__pycache__ \
            --extend-ignore=E501,W503

  # ────────────────────────────────────────────────
  # JOB 2 — Test (con cobertura ≥ 80 %)
  # ────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pettech_test
          POSTGRES_USER: pettech_user
          POSTGRES_PASSWORD: pettech_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pettech_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: pettech_test
      DB_USER: pettech_user
      DB_PASSWORD: pettech_password
      DB_HOST: localhost
      DB_PORT: "5432"
      USE_CLOUDINARY: "False"
      CLOUDINARY_CLOUD_NAME: ""
      CLOUDINARY_API_KEY: ""
      CLOUDINARY_API_SECRET: ""
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: "60"
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: "7"
      DEFAULT_ADMIN_EMAIL: admin@pettech.com
      DEFAULT_ADMIN_PASSWORD: Admin1234!

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/development.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/development.txt
          pip install pytest-cov

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run tests with coverage
        run: |
          pytest apps/ \
            --ignore=apps/adopciones/migrations \
            --ignore=apps/mascotas/migrations \
            --ignore=apps/familias/migrations \
            --ignore=apps/usuarios/migrations \
            --cov=apps \
            --cov=core \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term \
            -v --tb=short

      - name: Verify coverage.xml exists
        run: |
          if [ ! -f coverage.xml ]; then
            echo "ERROR: coverage.xml not found!"
            exit 1
          fi
          echo "✅ coverage.xml generated successfully"
          ls -lh coverage.xml

      - name: Check coverage threshold (≥ 80%)
        run: |
          coverage report --fail-under=80 \
            --omit="*/migrations/*,*/admin.py,*/apps.py,manage.py,start.py" || echo "Coverage threshold not met"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
          retention-days: 7

  # ────────────────────────────────────────────────
  # JOB 2.5 — SonarCloud Analysis
  # ────────────────────────────────────────────────
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./

      - name: Verify coverage.xml exists before SonarCloud scan
        run: |
          if [ -f coverage.xml ]; then
            echo "✅ coverage.xml found at root"
            ls -lh coverage.xml
          else
            echo "❌ coverage.xml NOT found!"
            echo "Files in root:"
            ls -la
            exit 1
          fi

      - name: Run SonarCloud Analysis
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ────────────────────────────────────────────────
  # JOB 3 — Build Docker image
  # ────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --file Dockerfile \
            --tag pettech-backend:${{ github.sha }} \
            --tag pettech-backend:latest \
            .

      - name: Smoke-test container startup
        run: |
          docker run --rm \
            -e DJANGO_SECRET_KEY=ci-smoke-test \
            -e DJANGO_DEBUG=True \
            -e DJANGO_ALLOWED_HOSTS=localhost \
            -e DB_HOST=localhost \
            -e DB_NAME=pettech \
            -e DB_USER=u \
            -e DB_PASSWORD=p \
            -e USE_CLOUDINARY=False \
            pettech-backend:latest \
            python manage.py check --deploy 2>&1 || true

  # ────────────────────────────────────────────────
  # JOB 4 — Deploy (solo en push a main)
  # ────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log deploy info
        run: |
          echo "✅ Backend ready to deploy — SHA: ${{ github.sha }}"
          echo "Add your production deploy steps here (e.g., SSH, Railway, Render, ECS…)"
