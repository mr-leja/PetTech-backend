name: CI/CD Frontend

on:
  push:
    branches: [main, develop]

env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────
  # JOB 1 — Install + Lint
  # ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript type-check
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────
  # JOB 2 — Test (cobertura ≥ 80 %)
  # ────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests with coverage
        run: npm run test:coverage -- --reporter=verbose
        # Vitest con jsdom puede retornar código 1 por "close timed out"
        # Los tests pasan; ignoramos ese exit code no-cero conocido
        continue-on-error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-frontend
          path: coverage/
          retention-days: 7

  # ────────────────────────────────────────────────
  # JOB 3 — Build
  # ────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: /api/v1

      - name: Build Docker image
        run: |
          docker build \
            --tag pettech-frontend:${{ github.sha }} \
            --tag pettech-frontend:latest \
            .

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ────────────────────────────────────────────────
  # JOB 4 — Deploy (solo en push a main)
  # ────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log deploy info
        run: |
          echo "✅ Frontend ready to deploy — SHA: ${{ github.sha }}"
          echo "Add your production deploy steps here (e.g., Netlify, Vercel, S3…)"
